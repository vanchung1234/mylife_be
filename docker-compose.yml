version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mylife-postgres
    restart: always
    environment:
      POSTGRES_DB: mylife_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: