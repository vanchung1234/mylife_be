# Định nghĩa các services (container) sẽ chạy
services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine  # Sử dụng image PostgreSQL 16 bản nhẹ (alpine)
    container_name: mylife-postgres  # Tên container
    environment:
      POSTGRES_DB: mylife           # Tạo database tên mylife khi khởi tạo
      POSTGRES_USER: mylife_user     # Tạo user
      POSTGRES_PASSWORD: mylife_pass # Mật khẩu
    ports:
      - "5432:5432"                  # Map port 5432 của máy host vào container
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Lưu dữ liệu vào volume để không mất khi container dừng
    healthcheck:                      # Kiểm tra sức khỏe container
      test: ["CMD-SHELL", "pg_isready -U mylife_user -d mylife"]
      interval: 10s                    # 10 giây kiểm tra 1 lần
      timeout: 5s
      retries: 5

  # Redis cache
  # redis:
  #   image: redis:7-alpine
  #   container_name: mylife-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes  # Bật chế độ ghi dữ liệu xuống disk
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # RabbitMQ message broker
  # rabbitmq:
  #   image: rabbitmq:3.13-management-alpine  # Bản có management UI
  #   container_name: mylife-rabbitmq
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   ports:
  #     - "5672:5672"      # Cổng AMQP cho ứng dụng kết nối
  #     - "15672:15672"    # Cổng web management UI
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # MinIO object storage (tương thích S3) - để lưu file
  minio:
    image: minio/minio:latest
    container_name: mylife-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"      # API S3
      - "9001:9001"      # Web console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

# Khai báo các volumes để dữ liệu được bền vững
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data: